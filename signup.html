<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Daftar — Arunika</title>

  <!-- Tailwind + font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Reuse CSS login -->
  <link rel="stylesheet" href="./assets/css/login.css"/>
</head>
<body class="antialiased">
  <!-- Parallax background (sama seperti login) -->
  <div class="parallax" aria-hidden="true">
    <div class="stars"></div>
    <div class="twinkling"></div>
  </div>

  <main class="min-h-screen grid place-items-center p-4">
    <section class="w-full max-w-md rounded-2xl p-8 login-card">
      <div class="flex justify-center mb-8">
        <img src="./assets/img/logo.png" alt="Arunika" class="h-12 w-auto"/>
      </div>

      <h1 class="text-2xl font-extrabold text-center">Buat Akun</h1>
      <p class="text-center text-sm text-white/70 mt-1">
        Akses progres asesmen & rekomendasi karirmu.
      </p>

      <form id="signup-form" class="mt-6 space-y-4" novalidate>
        <div>
          <label for="name" class="sr-only">Nama</label>
          <input id="name" name="name" class="w-full rounded-xl px-4 py-3 form-input"
                 placeholder="Nama lengkap" required />
        </div>

        <div>
          <label for="email" class="sr-only">Email</label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email"
                 class="w-full rounded-xl px-4 py-3 form-input" placeholder="nama@email.com" required />
          <p id="email-error" class="text-xs text-red-300 mt-1 hidden">Email tidak valid / sudah terdaftar.</p>
        </div>

        <div>
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" minlength="8" autocomplete="new-password"
                 class="w-full rounded-xl px-4 py-3 form-input" placeholder="Minimal 8 karakter" required />
          <p id="pass-error" class="text-xs text-red-300 mt-1 hidden">Minimal 8 karakter.</p>
        </div>

        <button type="submit" id="signupBtn" class="btn-grad w-full rounded-full py-3 font-bold text-lg">
          <span class="inline-flex items-center gap-2">
            <svg id="spinner" class="w-4 h-4 animate-spin hidden" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-opacity=".25" stroke-width="4"/>
              <path d="M21 12a9 9 0 00-9-9" stroke="currentColor" stroke-width="4"/>
            </svg>
            Daftar
          </span>
        </button>
      </form>

      <p class="text-center text-sm mt-6 text-white/70">
        Sudah punya akun? <a href="./login.html" class="underline font-semibold text-white">Masuk</a>
      </p>

      <div id="toast" class="hidden mt-4 rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm">
        Akun berhasil dibuat. Mengalihkan…
      </div>
    </section>
  </main>

  <!-- Konfig & Session global -->
  <script src="./assets/js/config.js" defer></script>
  <script src="./assets/js/session.js" defer></script>

  <!-- Logic khusus signup -->
  <script src="./assets/js/signup.js" defer></script>
</body>
</html>
